<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="theme-color" content="#fcfcfb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1a19" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- NOT black-translucent: iOS sizes the standalone window as if the status
     bar were opaque (screen minus ~62pt) but then anchors it at the top under
     a translucent bar, leaving a dead black band at the bottom. With
     "default" the window sits below the status bar and reaches the screen
     bottom. Confirmed via in-app diagnostics: innerHeight 812 on a 874pt
     iPhone 16 Pro. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Money" />
    <meta name="description" content="Gestisci spese, budget e risparmi in modo semplice" />
    <title>Money Tracker</title>
    <!--
      iOS standalone PWAs can render a black "letterbox" band at the bottom of
      the screen: `height: 100%`/`100dvh` on html/body is unreliable in
      standalone mode with viewport-fit=cover (WebKit silently falls back to
      a non-cover layout box, or dvh isn't initialized until a viewport
      geometry change happens (see https://bugs.webkit.org/show_bug.cgi?id=237961).
      `100vh` is stable from cold start once there is no browser chrome (i.e.
      in standalone), so we set a real, JS-measured `--app-height` px value as
      early as possible (before any stylesheet paints) and keep it in sync on
      resize/rotation, with `100vh` only as the pre-hydration fallback.
    -->
    <script>
      ;(function () {
        function setAppHeight() {
          document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px')
        }
        setAppHeight()
        window.addEventListener('resize', setAppHeight)
        window.addEventListener('orientationchange', setAppHeight)
        window.addEventListener('pageshow', setAppHeight)
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setAppHeight)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
